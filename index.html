<style>
        :root {
            --bg-color: #1A1A2E;      /* Deep Night Blue */
            --card-bg: #2D1B36;       /* Dark Eggplant */
            --text-color: #FDFBEE;    /* Antique Ivory */
            --accent-color: #A1887F;  /* Rose Taupe */
            --title-color: #D1C4E9;   /* Lavender */
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }
        
        header {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #2D1B36 0%, #3E2723 100%);
            border-bottom: 3px solid var(--accent-color);
        }
        
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 400;
            font-style: italic;
            color: var(--title-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            max-width: 600px;
            margin: 0 auto;
            font-style: italic;
            color: #D7CCC8;
            font-size: 1.1rem;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .post-card {
            background: var(--card-bg);
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-left: 5px solid var(--accent-color);
        }
        
        .post-date {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--accent-color);
            font-weight: bold;
        }
        
        .post-card h2 {
            font-family: 'Playfair Display', serif;
            margin: 10px 0;
            color: var(--title-color);
        }
        
        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
