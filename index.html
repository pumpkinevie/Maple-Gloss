<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maple Gloss | Digital Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1A1A2E;
            --card-bg: #2D1B36;
            --text-color: #FDFBEE;
            --accent-color: #D35400;
        }
        body { 
            font-family: 'Lora', serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
        }
        
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-style: italic; margin-bottom: 10px; }
        .subtitle { font-style: italic; opacity: 0.8; margin-bottom: 50px; }

        .cta-container { 
            max-width: 600px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        /* IL TUO BOTTONE ORIGINALE AGGIORNATO CON LE FOTO */
        .btn {
            background: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1.1rem;
            transition: 0.3s;
            border: 1px solid rgba(211, 84, 0, 0.2);
            overflow: hidden;
        }

        .btn:hover {
            transform: scale(1.02);
            background: #3D2B46;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* LA TUA COPERTINA QUADRATA/TONDA DENTRO IL BOTTONE */
        .btn img {
            width: 60px;
            height: 60px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 50%; /* Le rende dei piccoli cerchi estetici */
            border: 2px solid var(--accent-color);
        }

        .btn-text { text-align: left; }
        .category { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: var(--accent-color); 
            display: block; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>Maple Gloss</h1>
    <p class="subtitle">A sanctuary for seasonal souls and kitchen magic.</p>

    <div class="cta-container">
        
        <a href="cinnamon-rolls.html" class="btn">
            <img src="https://i.pinimg.com/736x/d5/68/92/d56892ce5f763e87a12fc6932fc7f9da.jpg" alt="Cinnamon">
            <div class="btn-text">
                <span class="category">Kitchen Alchemy</span>
                Cinnamon Rolls: Golden Glow
            </div>
        </a>

        <a href="pumpkin-muffins.html" class="btn">
            <img src="https://i.pinimg.com/1200x/fc/53/c8/fc53c8fef93f060faef1111cf82dbbb3.jpg" alt="Muffins">
            <div class="btn-text">
                <span class="category">Seasonal Eats</span>
                Fluffy Pumpkin Muffins
            </div>
        </a>

        <a href="moon-water.html" class="btn">
            <img src="https://i.pinimg.com/736x/7c/a5/bd/7ca5bd21771abeee50393455cc6f7561.jpg" alt="Moon Water">
            <div class="btn-text">
                <span class="category">Witchy Corner</span>
                Moon Water Ritual
            </div>
        </a>

        <a href="herb-magic.html" class="btn">
            <img src="https://i.pinimg.com/1200x/ad/b4/d7/adb4d778e5910ca8bea16e6fa16bfae3.jpg" alt="Herb Magic">
            <div class="btn-text">
                <span class="category">Witchy Corner</span>
                The Magic of Herbs
            </div>
        </a>

        <a href="book-review.html" class="btn">
            <img src="https://m.media-amazon.com/images/I/511oZaXJsLL._AC_UF1000,1000_QL80_.jpg" alt="Book">
            <div class="btn-text">
                <span class="category">Book Club</span>
                Across the Bitter Sea: Review
            </div>
        </a>

    </div>

</body>
</html>
